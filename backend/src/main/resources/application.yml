server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: image-manager-backend

  # PostgreSQL 数据库配置
  datasource:
    url: ${DATABASE_URL_JDBC:jdbc:postgresql://localhost:5432/image_management}
    # 如果 DATABASE_URL_JDBC 未设置，则从 PGDATABASE_URL 解析
    # PGDATABASE_URL 格式: postgresql://user:password@host:port/dbname
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:13369516}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境自动创建/更新表结构，生产环境建议改为 validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # SQL 初始化配置（首次部署时使用，之后可注释掉）
  # sql:
  #   init:
  #     mode: always
  #     schema-locations: classpath:schema.sql
  #     continue-on-error: false
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 5GB
      max-request-size: 5GB
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 应用配置
app:
  # 后端服务 URL（用于生成图片访问链接）
  backend:
    url: ${BACKEND_URL:http://localhost:8080/api}
  
  # 前端服务 URL（用于生成文档访问链接）
  frontend:
    url: ${FRONTEND_URL:http://localhost:5000}
  
  # Cookie 安全模式配置
  # true: 生产模式，sameSite=None, secure=true（需要 HTTPS）
  # false: 开发模式，sameSite=Lax, secure=false（localhost 不需要 HTTPS）
  cookie:
    secure-mode: false
  
  upload:
    path: ${UPLOAD_PATH:./uploads}
    allowed-types: jpg,jpeg,png,gif,webp,bmp
    max-size: 52428800  # 50MB for images
    document-max-size: 5368709120  # 5GB for documents
  
  # 存储配置
  storage:
    type: local  # local 或 s3
    # 本地存储路径（绝对路径或相对路径）
    local-path: ${UPLOAD_PATH:./uploads}
    # 存储服务基础URL（用于生成文件访问URL）
    # 图片实际访问路径: {base-url}/uploads/{filePath}
    # 由于 context-path 是 /api，静态资源 /uploads/** 实际路径是 /api/uploads/**
    # 所以 base-url 应该是 http://localhost:8080/api
    base-url: ${STORAGE_BASE_URL:http://localhost:8080/api}
  
  # AI 配置（向量化 Embedding + 对话）
  # Coze API Token: 登录 https://www.coze.cn/ → 个人空间 → 设置 → 开发者令牌
  ai:
    enabled: true
    api-key: ${AI_API_KEY:REDACTED_DOUBAO_KEY}
    base-url: ${AI_BASE_URL:https://api.coze.cn}
    model: doubao-seed-1-6-vision-250815
  
  # MiniMax 配置（记忆库AI对话）
  minimax:
    api-key: ${MINIMAX_API_KEY:REDACTED_MINIMAX_KEY}
    base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com/anthropic/v1/messages}
    model: ${MINIMAX_MODEL:MiniMax-M3}
  
  # 去水印配置
  watermark:
    remove:
      enabled: false  # 设置为 true 启用去水印功能
  
  # 图片增强配置
  image:
    enhance: true           # 启用图片增强（锐化、对比度调整）
    super-resolution: false # 启用超分辨率（2x放大，处理时间较长）
    # 超分辨率阈值：图片宽度小于此值时进行放大处理
    super-resolution-threshold: 800

# 日志配置
logging:
  level:
    # 只显示异步任务相关的日志
    com.imagemanager: INFO
    com.imagemanager.controller.AsyncBatchDownloadController: DEBUG
    com.imagemanager.service.BatchDownloadTaskService: DEBUG
    # 关闭其他库的日志
    org.springframework.web: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.springframework.jdbc.core: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %msg%n"
